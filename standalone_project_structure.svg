    <rect class="box" x="326" y="252" width="285" height="32" rx="6" stroke-width="0.5"/>
    <text class="ts" x="468" y="273" text-anchor="middle">drivers/  (driverlib copies)</text>
  </g>

  <!-- cmd/ -->
  <g class="c-blue">
    <rect x="50" y="342" width="240" height="100" rx="10" stroke-width="0.5"/>
